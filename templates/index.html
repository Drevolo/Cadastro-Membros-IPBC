<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Membros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .filtro-row { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .filtro-row .row { align-items: end; }
        .cursor-pointer { cursor: pointer; }
        .cursor-pointer:hover { background-color: #f0f0f0; }
        .table-container { max-height: 70vh; overflow-y: auto; }
        .table-container thead { position: sticky; top: 0; z-index: 1; }
        .table-container thead th { background: #fff; box-shadow: inset 0 -1px 0 #dee2e6; }
        .badge-sexo-m { background-color: #0d6efd; }
        .badge-sexo-f { background-color: #d63384; }
        @media (max-width: 768px) {
            .filtro-row .col-md-3 { margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <div class="container-fluid py-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 mb-0">Cadastro de Membros</h1>
            <div>
                <span class="badge bg-secondary me-2" id="totalRegistros">0 registros</span>
                <button class="btn btn-primary" onclick="abrirForm()">+ Novo Membro</button>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filtro-row">
            <div class="row g-2">
                <div class="col-md-3">
                    <label class="form-label small">Nome</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-nome" oninput="filtrar()">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Sexo</label>
                    <select class="form-select form-select-sm" id="filtro-sexo" onchange="filtrar()">
                        <option value="">Todos</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Igreja</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-igreja" oninput="filtrar()">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Livro n&ordm;</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-livro" oninput="filtrar()">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Ato n&ordm;</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-ato" oninput="filtrar()">
                </div>
            </div>
            <div class="row g-2 mt-1">
                <div class="col-md-3">
                    <label class="form-label small">Cidade (Nascimento)</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-nascimento_cidade" oninput="filtrar()">
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Estado (Nascimento)</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-nascimento_estado" oninput="filtrar()">
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Pai</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-pai" oninput="filtrar()">
                </div>
                <div class="col-md-3">
                    <label class="form-label small">M&atilde;e</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-mae" oninput="filtrar()">
                </div>
            </div>
            <div class="row g-2 mt-1">
                <div class="col-md-3">
                    <label class="form-label small">Batismo (Local)</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-batismo_local" oninput="filtrar()">
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Batismo (Oficiante)</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-batismo_oficiante" oninput="filtrar()">
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Admiss&atilde;o (Modo)</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-admissao_modo" oninput="filtrar()">
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Admiss&atilde;o (De onde)</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-admissao_deonde" oninput="filtrar()">
                </div>
            </div>
            <div class="row g-2 mt-1">
                <div class="col-md-3">
                    <label class="form-label small">Endere&ccedil;o</label>
                    <input type="text" class="form-control form-control-sm" id="filtro-endereco" oninput="filtrar()">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-outline-secondary btn-sm me-2" onclick="limparFiltros()">Limpar</button>
                    <button class="btn btn-outline-info btn-sm" onclick="exportarCSV()">Exportar CSV</button>
                </div>
            </div>
        </div>

        <!-- Tabela -->
        <div class="table-container">
            <table class="table table-striped table-hover table-sm mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Sexo</th>
                        <th>Nascimento</th>
                        <th>Filia&ccedil;&atilde;o</th>
                        <th>Batismo</th>
                        <th>Admiss&atilde;o</th>
                        <th>Livro</th>
                        <th>Ato</th>
                        <th>Endere&ccedil;o</th>
                        <th>Igreja</th>
                        <th>A&ccedil;&otilde;es</th>
                    </tr>
                </thead>
                <tbody id="tabelaMembros"></tbody>
            </table>
        </div>
        <div id="emptyState" class="text-center text-muted py-5 d-none">
            <p class="mb-1 fs-5">Nenhum membro cadastrado</p>
            <p class="small">Clique em "+ Novo Membro" para come&ccedil;ar</p>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalTitle">Novo Membro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="membro-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" id="form-nome" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Sexo</label>
                            <select class="form-select" id="form-sexo">
                                <option value="">Selecione</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Igreja</label>
                            <input type="text" class="form-control" id="form-igreja">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Nascimento</strong></div>
                        <div class="col-md-4">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control" id="form-nascimento_data">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Cidade</label>
                            <input type="text" class="form-control" id="form-nascimento_cidade">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Estado</label>
                            <input type="text" class="form-control" id="form-nascimento_estado">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Filia&ccedil;&atilde;o</strong></div>
                        <div class="col-md-3">
                            <label class="form-label">Pai</label>
                            <input type="text" class="form-control" id="form-pai">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Religi&atilde;o (Pai)</label>
                            <input type="text" class="form-control" id="form-pai_religiao">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">M&atilde;e</label>
                            <input type="text" class="form-control" id="form-mae">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Religi&atilde;o (M&atilde;e)</label>
                            <input type="text" class="form-control" id="form-mae_religiao">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Batismo</strong></div>
                        <div class="col-md-4">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control" id="form-batismo_data">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Igreja / Local</label>
                            <input type="text" class="form-control" id="form-batismo_local">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Oficiante</label>
                            <input type="text" class="form-control" id="form-batismo_oficiante">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Admiss&atilde;o</strong></div>
                        <div class="col-md-3">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control" id="form-admissao_data">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Modo</label>
                            <input type="text" class="form-control" id="form-admissao_modo">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">De onde</label>
                            <input type="text" class="form-control" id="form-admissao_deonde">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Oficiante</label>
                            <input type="text" class="form-control" id="form-admissao_oficiante">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Registro</strong></div>
                        <div class="col-md-3">
                            <label class="form-label">Livro n&ordm;</label>
                            <input type="text" class="form-control" id="form-livro_numero">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Ato n&ordm;</label>
                            <input type="text" class="form-control" id="form-ato_numero">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Endere&ccedil;o</label>
                            <input type="text" class="form-control" id="form-endereco">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvar()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let modalInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            modalInstance = new bootstrap.Modal(document.getElementById('formModal'));
            carregar();
        });

        async function carregar() {
            const params = new URLSearchParams();
            document.querySelectorAll('[id^="filtro-"]').forEach(el => {
                const campo = el.id.replace('filtro-', '');
                if (el.value) params.set(campo, el.value);
            });
            const res = await fetch('/api/membros?' + params.toString());
            const json = await res.json();
            const tbody = document.getElementById('tabelaMembros');
            tbody.innerHTML = '';
            document.getElementById('totalRegistros').textContent = json.total + ' registro(s)';

            if (json.data.length === 0) {
                document.getElementById('emptyState').classList.remove('d-none');
            } else {
                document.getElementById('emptyState').classList.add('d-none');
                json.data.forEach(m => {
                    const tr = document.createElement('tr');
                    tr.className = 'cursor-pointer';
                    tr.onclick = () => editar(m.id);
                    const sexoLabel = m.sexo === 'Masculino' ? '<span class="badge badge-sexo-m">M</span>' :
                                     m.sexo === 'Feminino' ? '<span class="badge badge-sexo-f">F</span>' : '-';
                    tr.innerHTML = `
                        <td>${m.id}</td>
                        <td><strong>${esc(m.nome)}</strong></td>
                        <td>${sexoLabel}</td>
                        <td class="small">${formatDate(m.nascimento_data)}${m.nascimento_cidade ? '<br>' + esc(m.nascimento_cidade) : ''}${m.nascimento_estado ? '/' + esc(m.nascimento_estado) : ''}</td>
                        <td class="small">${m.pai ? 'Pai: ' + esc(m.pai) + (m.pai_religiao ? ' (' + esc(m.pai_religiao) + ')' : '') : ''}${m.mae ? '<br>M&atilde;e: ' + esc(m.mae) + (m.mae_religiao ? ' (' + esc(m.mae_religiao) + ')' : '') : ''}</td>
                        <td class="small">${formatDate(m.batismo_data)}${m.batismo_local ? '<br>' + esc(m.batismo_local) : ''}${m.batismo_oficiante ? '<br><em>' + esc(m.batismo_oficiante) + '</em>' : ''}</td>
                        <td class="small">${formatDate(m.admissao_data)}${m.admissao_modo ? '<br>' + esc(m.admissao_modo) : ''}${m.admissao_deonde ? '<br>De: ' + esc(m.admissao_deonde) : ''}${m.admissao_oficiante ? '<br><em>' + esc(m.admissao_oficiante) + '</em>' : ''}</td>
                        <td>${esc(m.livro_numero)}</td>
                        <td>${esc(m.ato_numero)}</td>
                        <td class="small">${esc(m.endereco)}</td>
                        <td>${esc(m.igreja)}</td>
                        <td onclick="event.stopPropagation()">
                            <button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="deletar(${m.id})" title="Excluir">&times;</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function filtrar() { carregar(); }

        function limparFiltros() {
            document.querySelectorAll('[id^="filtro-"]').forEach(el => el.value = '');
            carregar();
        }

        function abrirForm(data = null) {
            document.getElementById('formModalTitle').textContent = data ? 'Editar Membro' : 'Novo Membro';
            document.getElementById('membro-id').value = data ? data.id : '';
            document.getElementById('form-nome').value = data ? (data.nome || '') : '';
            document.getElementById('form-sexo').value = data ? (data.sexo || '') : '';
            document.getElementById('form-nascimento_data').value = data ? (data.nascimento_data || '') : '';
            document.getElementById('form-nascimento_cidade').value = data ? (data.nascimento_cidade || '') : '';
            document.getElementById('form-nascimento_estado').value = data ? (data.nascimento_estado || '') : '';
            document.getElementById('form-pai').value = data ? (data.pai || '') : '';
            document.getElementById('form-pai_religiao').value = data ? (data.pai_religiao || '') : '';
            document.getElementById('form-mae').value = data ? (data.mae || '') : '';
            document.getElementById('form-mae_religiao').value = data ? (data.mae_religiao || '') : '';
            document.getElementById('form-batismo_data').value = data ? (data.batismo_data || '') : '';
            document.getElementById('form-batismo_local').value = data ? (data.batismo_local || '') : '';
            document.getElementById('form-batismo_oficiante').value = data ? (data.batismo_oficiante || '') : '';
            document.getElementById('form-admissao_data').value = data ? (data.admissao_data || '') : '';
            document.getElementById('form-admissao_modo').value = data ? (data.admissao_modo || '') : '';
            document.getElementById('form-admissao_deonde').value = data ? (data.admissao_deonde || '') : '';
            document.getElementById('form-admissao_oficiante').value = data ? (data.admissao_oficiante || '') : '';
            document.getElementById('form-livro_numero').value = data ? (data.livro_numero || '') : '';
            document.getElementById('form-ato_numero').value = data ? (data.ato_numero || '') : '';
            document.getElementById('form-endereco').value = data ? (data.endereco || '') : '';
            document.getElementById('form-igreja').value = data ? (data.igreja || '') : '';
            modalInstance.show();
        }

        async function editar(id) {
            const res = await fetch('/api/membros?' + new URLSearchParams({ id: '' }));
            const json = await res.json();
            const membro = json.data.find(m => m.id === id);
            if (membro) abrirForm(membro);
        }

        async function salvar() {
            const id = document.getElementById('membro-id').value;
            const data = {
                nome: document.getElementById('form-nome').value,
                sexo: document.getElementById('form-sexo').value,
                nascimento_data: document.getElementById('form-nascimento_data').value,
                nascimento_cidade: document.getElementById('form-nascimento_cidade').value,
                nascimento_estado: document.getElementById('form-nascimento_estado').value,
                pai: document.getElementById('form-pai').value,
                pai_religiao: document.getElementById('form-pai_religiao').value,
                mae: document.getElementById('form-mae').value,
                mae_religiao: document.getElementById('form-mae_religiao').value,
                batismo_data: document.getElementById('form-batismo_data').value,
                batismo_local: document.getElementById('form-batismo_local').value,
                batismo_oficiante: document.getElementById('form-batismo_oficiante').value,
                admissao_data: document.getElementById('form-admissao_data').value,
                admissao_modo: document.getElementById('form-admissao_modo').value,
                admissao_deonde: document.getElementById('form-admissao_deonde').value,
                admissao_oficiante: document.getElementById('form-admissao_oficiante').value,
                livro_numero: document.getElementById('form-livro_numero').value,
                ato_numero: document.getElementById('form-ato_numero').value,
                endereco: document.getElementById('form-endereco').value,
                igreja: document.getElementById('form-igreja').value
            };

            const url = id ? `/api/membros/${id}` : '/api/membros';
            const method = id ? 'PUT' : 'POST';

            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            modalInstance.hide();
            carregar();
        }

        async function deletar(id) {
            if (!confirm('Tem certeza que deseja excluir este membro?')) return;
            await fetch(`/api/membros/${id}`, { method: 'DELETE' });
            carregar();
        }

        function exportarCSV() {
            fetch('/api/membros')
                .then(r => r.json())
                .then(json => {
                    if (json.data.length === 0) { alert('Nenhum registro para exportar'); return; }
                    const headers = ['ID','Nome','Sexo','Nascimento Data','Nascimento Cidade','Nascimento Estado',
                        'Pai','Religião (Pai)','Mãe','Religião (Mãe)',
                        'Batismo Data','Batismo Local','Batismo Oficiante',
                        'Admissão Data','Admissão Modo','Admissão De Onde','Admissão Oficiante',
                        'Livro nº','Ato nº','Endereço','Igreja'];
                    const rows = json.data.map(m => [
                        m.id, m.nome, m.sexo,
                        m.nascimento_data, m.nascimento_cidade, m.nascimento_estado,
                        m.pai, m.pai_religiao, m.mae, m.mae_religiao,
                        m.batismo_data, m.batismo_local, m.batismo_oficiante,
                        m.admissao_data, m.admissao_modo, m.admissao_deonde, m.admissao_oficiante,
                        m.livro_numero, m.ato_numero, m.endereco, m.igreja
                    ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
                    const csv = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'membros.csv';
                    a.click();
                });
        }

        function esc(s) { return s ? s.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '-'; }
        function formatDate(d) { return d ? d : ''; }
    </script>
</body>
</html>
