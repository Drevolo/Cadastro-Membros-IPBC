<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Membros - IPBC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid py-3">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0">Cadastro de Membros - IPBC</h1>
            <button class="btn btn-outline-info btn-sm" onclick="exportarCSV()">Exportar CSV</button>
        </div>

        <ul class="nav nav-tabs" id="mainTabs">
            <li class="nav-item">
                <button class="nav-link active" id="tab-inserir" data-bs-toggle="tab" data-bs-target="#inserir" type="button">Inserir Novo Membro</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="tab-pesquisar" data-bs-toggle="tab" data-bs-target="#pesquisar" type="button">Pesquisar Membro</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- ABA INSERIR -->
            <div class="tab-pane fade show active" id="inserir">
                <div class="form-section">
                    <input type="hidden" id="membro-id">

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Dados do Membro</h5>
                        <span class="badge bg-secondary" id="formStatus">Novo</span>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control form-control-sm" id="form-nome">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Sexo</label>
                            <select class="form-select form-select-sm" id="form-sexo">
                                <option value="">Selecione</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Igreja</label>
                            <input type="text" class="form-control form-control-sm" id="form-igreja">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Nascimento</strong></div>
                        <div class="col-md-4">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control form-control-sm" id="form-nascimento_data">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Cidade</label>
                            <input type="text" class="form-control form-control-sm" id="form-nascimento_cidade">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Estado</label>
                            <input type="text" class="form-control form-control-sm" id="form-nascimento_estado">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Filia&ccedil;&atilde;o</strong></div>
                        <div class="col-md-3">
                            <label class="form-label">Pai</label>
                            <input type="text" class="form-control form-control-sm" id="form-pai">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Religi&atilde;o (Pai)</label>
                            <input type="text" class="form-control form-control-sm" id="form-pai_religiao">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">M&atilde;e</label>
                            <input type="text" class="form-control form-control-sm" id="form-mae">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Religi&atilde;o (M&atilde;e)</label>
                            <input type="text" class="form-control form-control-sm" id="form-mae_religiao">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Batismo</strong></div>
                        <div class="col-md-4">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control form-control-sm" id="form-batismo_data">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Igreja / Local</label>
                            <input type="text" class="form-control form-control-sm" id="form-batismo_local">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Oficiante</label>
                            <input type="text" class="form-control form-control-sm" id="form-batismo_oficiante">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Admiss&atilde;o</strong></div>
                        <div class="col-md-3">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control form-control-sm" id="form-admissao_data">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Modo</label>
                            <input type="text" class="form-control form-control-sm" id="form-admissao_modo">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">De onde</label>
                            <input type="text" class="form-control form-control-sm" id="form-admissao_deonde">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Oficiante</label>
                            <input type="text" class="form-control form-control-sm" id="form-admissao_oficiante">
                        </div>

                        <div class="col-12"><hr class="my-1"><strong>Registro</strong></div>
                        <div class="col-md-3">
                            <label class="form-label">Livro n&ordm;</label>
                            <input type="text" class="form-control form-control-sm" id="form-livro_numero">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Ato n&ordm;</label>
                            <input type="text" class="form-control form-control-sm" id="form-ato_numero">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Endere&ccedil;o</label>
                            <input type="text" class="form-control form-control-sm" id="form-endereco">
                        </div>
                    </div>

                    <div class="mt-3 d-flex gap-2">
                        <button class="btn btn-primary" onclick="salvar()">Salvar</button>
                        <button class="btn btn-outline-secondary" onclick="limparForm()" id="btnCancelar" style="display:none">Cancelar</button>
                    </div>
                </div>
            </div>

            <!-- ABA PESQUISAR -->
            <div class="tab-pane fade" id="pesquisar">
                <div class="filter-section">
                    <div class="row g-2">
                        <div class="col-md-3">
                            <label>Nome</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-nome" oninput="filtrar()">
                        </div>
                        <div class="col-md-2">
                            <label>Sexo</label>
                            <select class="form-select form-select-sm" id="filtro-sexo" onchange="filtrar()">
                                <option value="">Todos</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label>Igreja</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-igreja" oninput="filtrar()">
                        </div>
                        <div class="col-md-2">
                            <label>Livro n&ordm;</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-livro" oninput="filtrar()">
                        </div>
                        <div class="col-md-2">
                            <label>Ato n&ordm;</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-ato" oninput="filtrar()">
                        </div>
                    </div>
                    <div class="row g-2 mt-1">
                        <div class="col-md-3">
                            <label>Cidade (Nascimento)</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-nascimento_cidade" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>Estado (Nascimento)</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-nascimento_estado" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>Pai</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-pai" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>M&atilde;e</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-mae" oninput="filtrar()">
                        </div>
                    </div>
                    <div class="row g-2 mt-1">
                        <div class="col-md-3">
                            <label>Batismo (Local)</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-batismo_local" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>Batismo (Oficiante)</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-batismo_oficiante" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>Admiss&atilde;o (Modo)</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-admissao_modo" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>Admiss&atilde;o (De onde)</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-admissao_deonde" oninput="filtrar()">
                        </div>
                    </div>
                    <div class="row g-2 mt-1">
                        <div class="col-md-3">
                            <label>Endere&ccedil;o</label>
                            <input type="text" class="form-control form-control-sm" id="filtro-endereco" oninput="filtrar()">
                        </div>
                        <div class="col-md-3 d-flex align-items-end gap-2">
                            <button class="btn btn-outline-secondary btn-sm" onclick="limparFiltros()">Limpar</button>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <span class="badge bg-secondary" id="totalRegistros">0 registro(s)</span>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <table class="table table-striped table-hover table-sm mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nome</th>
                                <th>Sexo</th>
                                <th>Nascimento</th>
                                <th>Filia&ccedil;&atilde;o</th>
                                <th>Batismo</th>
                                <th>Admiss&atilde;o</th>
                                <th>Livro</th>
                                <th>Ato</th>
                                <th>Endere&ccedil;o</th>
                                <th>Igreja</th>
                                <th>A&ccedil;&otilde;es</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaMembros"></tbody>
                    </table>
                </div>
                <div id="emptyState" class="text-center text-muted py-4 d-none">
                    <p class="mb-0">Nenhum membro encontrado</p>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
