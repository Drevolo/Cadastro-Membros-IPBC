<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Membros - IPBC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid py-3">

        <div class="page-header">
            <h1>Cadastro de Membros - IPBC</h1>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-light" onclick="exportarCSV()">
                    &#8595; Exportar CSV
                </button>
                <a href="/logout" class="btn btn-outline-light" style="border-color:rgba(255,255,255,0.3)">
                    Sair
                </a>
            </div>
        </div>

        <ul class="nav nav-tabs" id="mainTabs">
            <li class="nav-item">
                <button class="nav-link active" id="tab-inserir" data-bs-toggle="tab" data-bs-target="#inserir" type="button">
                    <span class="tab-icon">+</span> Inserir Novo Membro
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="tab-pesquisar" data-bs-toggle="tab" data-bs-target="#pesquisar" type="button">
                    <span class="tab-icon">&#128269;</span> Pesquisar Membro
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- ===== ABA INSERIR ===== -->
            <div class="tab-pane fade show active" id="inserir">
                <input type="hidden" id="membro-id">

                <div class="form-top-bar">
                    <h5>Dados do Membro</h5>
                    <span class="badge" id="formStatus">Novo</span>
                </div>

                <!-- Nome (único campo de texto livre) -->
                <div class="row g-3 mb-3">
                    <div class="col-md-12">
                        <label style="font-weight:700; font-size:0.9rem; color:#1a1a2e; display:block; margin-bottom:4px;">Nome</label>
                        <input type="text" class="form-control form-control-lg" id="form-nome" placeholder="Nome completo do membro" style="border:2px solid #1a1a2e; border-radius:8px; padding:12px 16px; font-size:1.05rem;">
                    </div>
                </div>

                <!-- Sexo + Igreja -->
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <label style="font-weight:700; font-size:0.85rem; color:#333; display:block; margin-bottom:4px;">Sexo</label>
                        <select class="form-select" id="form-sexo" style="border:2px solid #e5e7eb; border-radius:8px; padding:10px 14px;">
                            <option value="">Selecione</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Feminino">Feminino</option>
                        </select>
                    </div>
                    <div class="col-md-9">
                        <label style="font-weight:700; font-size:0.85rem; color:#333; display:block; margin-bottom:4px;">Igreja</label>
                        <input type="text" class="form-control" id="form-igreja" placeholder="Nome da igreja" style="border:2px solid #e5e7eb; border-radius:8px; padding:10px 14px;">
                    </div>
                </div>

                <!-- 1. Nascimento -->
                <div class="form-card form-card-nascimento">
                    <div class="form-card-header">
                        <span class="form-card-number">1</span>
                        <span class="form-card-title">Nascimento</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label>Data</label>
                            <input type="date" class="form-control" id="form-nascimento_data">
                        </div>
                        <div class="col-md-4">
                            <label>Estado</label>
                            <select class="form-select" id="form-nascimento_estado"></select>
                        </div>
                        <div class="col-md-4">
                            <label>Cidade</label>
                            <select class="form-select" id="form-nascimento_cidade" disabled>
                                <option value="">Selecione um estado primeiro</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 2. Filiação -->
                <div class="form-card form-card-filiacao">
                    <div class="form-card-header">
                        <span class="form-card-number">2</span>
                        <span class="form-card-title">Filia&ccedil;&atilde;o</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label>Pai</label>
                            <input type="text" class="form-control" id="form-pai" placeholder="Nome do pai">
                        </div>
                        <div class="col-md-3">
                            <label>Religi&atilde;o (Pai)</label>
                            <select class="form-select" id="form-pai_religiao"></select>
                        </div>
                        <div class="col-md-3">
                            <label>M&atilde;e</label>
                            <input type="text" class="form-control" id="form-mae" placeholder="Nome da m&atilde;e">
                        </div>
                        <div class="col-md-3">
                            <label>Religi&atilde;o (M&atilde;e)</label>
                            <select class="form-select" id="form-mae_religiao"></select>
                        </div>
                    </div>
                </div>

                <!-- 3. Batismo -->
                <div class="form-card form-card-batismo">
                    <div class="form-card-header">
                        <span class="form-card-number">3</span>
                        <span class="form-card-title">Batismo</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label>Data</label>
                            <input type="date" class="form-control" id="form-batismo_data">
                        </div>
                        <div class="col-md-4">
                            <label>Igreja / Local</label>
                            <input type="text" class="form-control" id="form-batismo_local" placeholder="Onde foi batizado">
                        </div>
                        <div class="col-md-4">
                            <label>Oficiante</label>
                            <input type="text" class="form-control" id="form-batismo_oficiante" placeholder="Quem batizou">
                        </div>
                    </div>
                </div>

                <!-- 4. Admissão -->
                <div class="form-card form-card-admissao">
                    <div class="form-card-header">
                        <span class="form-card-number">4</span>
                        <span class="form-card-title">Admiss&atilde;o</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label>Data</label>
                            <input type="date" class="form-control" id="form-admissao_data">
                        </div>
                        <div class="col-md-3">
                            <label>Modo</label>
                            <select class="form-select" id="form-admissao_modo"></select>
                        </div>
                        <div class="col-md-3">
                            <label>De onde</label>
                            <input type="text" class="form-control" id="form-admissao_deonde" placeholder="Igreja de origem">
                        </div>
                        <div class="col-md-3">
                            <label>Oficiante</label>
                            <input type="text" class="form-control" id="form-admissao_oficiante" placeholder="Quem oficiou">
                        </div>
                    </div>
                </div>

                <!-- 5. Registro -->
                <div class="form-card form-card-registro">
                    <div class="form-card-header">
                        <span class="form-card-number">5</span>
                        <span class="form-card-title">Registro</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label>Livro n&ordm;</label>
                            <input type="text" class="form-control" id="form-livro_numero" placeholder="N&uacute;mero do livro">
                        </div>
                        <div class="col-md-3">
                            <label>Ato n&ordm;</label>
                            <input type="text" class="form-control" id="form-ato_numero" placeholder="N&uacute;mero do ato">
                        </div>
                        <div class="col-md-6">
                            <label>Endere&ccedil;o</label>
                            <input type="text" class="form-control" id="form-endereco" placeholder="Endere&ccedil;o completo">
                        </div>
                    </div>
                </div>

                <!-- Botões -->
                <div class="form-actions">
                    <button class="btn btn-primary px-4" onclick="salvar()">Salvar</button>
                    <button class="btn btn-outline-secondary px-4" onclick="limparForm()" id="btnCancelar" style="display:none">Cancelar</button>
                </div>
            </div>

            <!-- ===== ABA PESQUISAR ===== -->
            <div class="tab-pane fade" id="pesquisar">
                <div class="filter-section">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label>Nome</label>
                            <input type="text" class="form-control" id="filtro-nome" placeholder="Digite um nome" oninput="filtrar()">
                        </div>
                        <div class="col-md-2">
                            <label>Sexo</label>
                            <select class="form-select" id="filtro-sexo" onchange="filtrar()">
                                <option value="">Todos</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label>Estado (Nascimento)</label>
                            <select class="form-select" id="filtro-nascimento_estado" onchange="carregarCidades(this); filtrar();">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label>Cidade (Nascimento)</label>
                            <select class="form-select" id="filtro-nascimento_cidade" onchange="filtrar()" disabled>
                                <option value="">Todas</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-3">
                            <label>Igreja</label>
                            <input type="text" class="form-control" id="filtro-igreja" placeholder="Nome da igreja" oninput="filtrar()">
                        </div>
                        <div class="col-md-2">
                            <label>Livro n&ordm;</label>
                            <input type="text" class="form-control" id="filtro-livro" placeholder="N&uacute;mero" oninput="filtrar()">
                        </div>
                        <div class="col-md-2">
                            <label>Ato n&ordm;</label>
                            <input type="text" class="form-control" id="filtro-ato" placeholder="N&uacute;mero" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>Admiss&atilde;o (Modo)</label>
                            <select class="form-select" id="filtro-admissao_modo" onchange="filtrar()">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="col-md-2 d-flex align-items-end gap-2">
                            <button class="btn btn-outline-secondary" onclick="limparFiltros()">Limpar</button>
                        </div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-3">
                            <label>Pai</label>
                            <input type="text" class="form-control" id="filtro-pai" placeholder="Nome do pai" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>M&atilde;e</label>
                            <input type="text" class="form-control" id="filtro-mae" placeholder="Nome da m&atilde;e" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>Religi&atilde;o</label>
                            <select class="form-select" id="filtro-religiao" onchange="filtrar()">
                                <option value="">Todas</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label>Batismo (Local)</label>
                            <input type="text" class="form-control" id="filtro-batismo_local" placeholder="Local" oninput="filtrar()">
                        </div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-3">
                            <label>Batismo (Oficiante)</label>
                            <input type="text" class="form-control" id="filtro-batismo_oficiante" placeholder="Oficiante" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>Admiss&atilde;o (De onde)</label>
                            <input type="text" class="form-control" id="filtro-admissao_deonde" placeholder="Igreja de origem" oninput="filtrar()">
                        </div>
                        <div class="col-md-3">
                            <label>Endere&ccedil;o</label>
                            <input type="text" class="form-control" id="filtro-endereco" placeholder="Endere&ccedil;o" oninput="filtrar()">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <span class="badge bg-secondary" id="totalRegistros">0 registro(s)</span>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <table class="table table-hover table-sm mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nome</th>
                                <th>Sexo</th>
                                <th>Nascimento</th>
                                <th>Filia&ccedil;&atilde;o</th>
                                <th>Batismo</th>
                                <th>Admiss&atilde;o</th>
                                <th>Livro</th>
                                <th>Ato</th>
                                <th>Endere&ccedil;o</th>
                                <th>Igreja</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tabelaMembros"></tbody>
                    </table>
                </div>
                <div id="emptyState" class="text-center text-muted py-5 d-none">
                    <p>Nenhum membro encontrado</p>
                    <p class="small text-muted">Use a aba "Inserir Novo Membro" para cadastrar</p>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
