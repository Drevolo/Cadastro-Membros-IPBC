<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cadastro de Membros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d5e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-card p {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .login-card label {
            font-weight: 700;
            font-size: 0.85rem;
            color: #333;
            margin-bottom: 4px;
        }
        .login-card .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1rem;
        }
        .login-card .form-control:focus {
            border-color: #1a1a2e;
            box-shadow: 0 0 0 4px rgba(26, 26, 46, 0.1);
        }
        .login-card .btn-primary {
            background: #1a1a2e;
            border: none;
            padding: 12px;
            font-weight: 700;
            border-radius: 8px;
            width: 100%;
            font-size: 1rem;
        }
        .login-card .btn-primary:hover {
            background: #2d2d5e;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 26, 46, 0.3);
        }
        .alert {
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Cadastro de Membros</h1>
        <p>Igreja Presbiteriana do Brasil</p>

        {% if erro %}
        <div class="alert alert-danger py-2">{{ erro }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label>Usu&aacute;rio</label>
                <input type="text" class="form-control" name="username" required autofocus>
            </div>
            <div class="mb-4">
                <label>Senha</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
    </div>
</body>
</html>
